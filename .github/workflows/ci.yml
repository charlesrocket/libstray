---

name: CI
"on": [push, pull_request]

permissions:
  id-token: write
  contents: read
  attestations: read

env:
  ZIG_VERSION: 0.15.2

jobs:
  test-linux:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install dependencies
        run: sudo apt install -y libdbus-1-dev

      - name: Run tests
        run: |
          zig build test --verbose --summary all

  demo-linux:
    name: Demo
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: ["fast", "safe", "small", "off"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install dependencies
        run: sudo apt install -y libdbus-1-dev

      - name: Build demo
        run: |
          zig build demo --release=${{ matrix.mode }} --verbose --summary all

  lint:
    name: Format
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/')"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Check formatting
        run: zig fmt --check .

  release:
    name: Release
    needs: [test-linux, demo-linux]
    permissions:
      contents: write
      id-token: write
      attestations: write
      pages: write

    if: |
      github.repository_owner == 'charlesrocket' &&
      startsWith(github.ref, 'refs/tags/')

    uses: ./.github/workflows/cd.yml
    with:
      tag_name: ${{ github.ref_name }}
